name: build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            name: windows-amd64
            ext: .exe
          - os: windows-latest
            goos: windows
            goarch: arm64
            name: windows-arm64
            ext: .exe
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            name: linux-amd64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            name: linux-arm64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: arm
            goarm: "7"
            name: linux-armv7
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            name: macos-amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            name: macos-arm64
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.name }}"
          export GOOS="${{ matrix.goos }}"
          export GOARCH="${{ matrix.goarch }}"
          if [[ -n "${{ matrix.goarm || '' }}" ]]; then
            export GOARM="${{ matrix.goarm }}"
          fi
          go build -trimpath -ldflags "-s -w" -o "dist/${{ matrix.name }}/Codex${{ matrix.ext }}" ./cmd/codex-portable
      - uses: actions/upload-artifact@v4
        with:
          name: Codex-${{ matrix.name }}
          path: dist/${{ matrix.name }}/

